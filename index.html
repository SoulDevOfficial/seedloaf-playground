<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playground</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: url("https://cdn.discordapp.com/attachments/1256071149998047242/1479172648448688231/IiTmJ.png?ex=69abbb21&is=69aa69a1&hm=f9e2a2a70d3ec6af0123aa42977ba3ee312a91a7e02e98905c5c8c42cfc58ea5&");
        }
        .container {
            text-align: center;
            background: #0b1220;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #ffffff;
            margin-bottom: 1.5rem;
        }
        
        .btn {
            display: block;
            background-color: #007bff;
            color: white;
            padding: 15px;
            margin: 10px 0;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #0056b3;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Playground</h1>        
        <a href="https://souldevofficial.github.io/seedloaf-playground/serversettings" class="btn">Build: Server Settings</a>
        <a href="https://souldevofficial.github.io/seedloaf-playground/worldlist" class="btn">Build: World List</a>
        
        <div class="footer">
            (Unofficial)
        </div>
    </div>

</body>
</html>
