```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Settings</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}
body{background:linear-gradient(180deg,#0f172a,#020617);color:#fff;height:100vh;display:flex}
.sidebar{width:230px;background:#0b1220;padding:20px 12px}
.sidebar ul{list-style:none}
.sidebar li{margin-bottom:4px}
.sidebar a{display:block;padding:10px 12px;border-radius:6px;color:#cbd5f5;text-decoration:none;font-size:14px}
.sidebar a:hover{background:#111a33}
.sidebar .active{background:#111a33;color:#7c8cff}
.main{flex:1;padding:30px 40px}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.title{font-size:28px;font-weight:600}
.btn{padding:8px 16px;border-radius:6px;border:none;font-size:14px;cursor:pointer}
.btn-outline{background:transparent;border:1px solid #6d79ff;color:#6d79ff}
.btn-primary{background:#6d79ff;color:#fff}
.top-buttons{display:flex;gap:10px}
.divider{height:1px;background:#1e293b;margin-bottom:20px}
.section-title{font-size:18px;margin-bottom:18px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px 30px;max-width:820px}
.form-group{display:flex;flex-direction:column}
label{font-size:13px;margin-bottom:5px;color:#cbd5f5}
input,select{padding:10px 12px;border-radius:6px;border:1px solid #2a3553;background:#020617;color:#fff;font-size:14px}
input:focus,select:focus{border-color:#6d79ff;outline:none}
.save-btn{margin-top:20px}
@media(max-width:900px){.form-grid{grid-template-columns:1fr}.sidebar{display:none}}
</style>
</head>
<body>

<div class="sidebar">
<ul>
<li><a href="#">Dashboard</a></li>
<li><a href="#" class="active">World Settings</a></li>
<li><a href="#">Server Properties</a></li>
<li><a href="#">Player Settings</a></li>
<li><a href="#">World & Backups</a></li>
<li><a href="#">File Manager</a></li>
<li><a href="#">World Logs</a></li>
<li><a href="#">Additional Ports</a></li>
<li><a href="#">Access Management</a></li>
</ul>
</div>

<div class="main">
<div class="topbar">
<div class="title">World Settings</div>
<div class="top-buttons">
<button class="btn btn-outline">Back</button>
<button class="btn btn-primary">Start World</button>
</div>
</div>

<div class="divider"></div>

<div class="section-title">World Details</div>

<div class="form-grid">
<div class="form-group">
<label>World Name</label>
<input type="text" value="Example">
</div>

<div class="form-group">
<label>Subdomain</label>
<input type="text" value="example.sdlf.fun">
</div>

<div class="form-group">
<label>Server Type</label>
<select>
<option>Paper</option>
<option>Spigot</option>
<option>Vanilla</option>
</select>
</div>

<div class="form-group">
<label>Server Version</label>
<select>
<option>Latest - keeps you up to date with the latest version</option>
<option>1.21</option>
<option>1.20.4</option>
<option>1.19.4</option>
</select>
</div>

<div class="form-group">
<label>Server Timezone</label>
<select>
<option>America/New_York</option>
<option>America/Chicago</option>
<option>America/Los_Angeles</option>
<option>UTC</option>
</select>
</div>

<div class="form-group">
<label>Java Version</label>
<select>
<option>Automatic - Chooses the correct version</option>
<option>Java 21</option>
<option>Java 17</option>
<option>Java 8</option>
</select>
</div>
</div>

<button class="btn btn-primary save-btn">Save Changes</button>

</div>

</body>
</html>
```
