<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>World Settings</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Segoe UI,sans-serif}

body{
background:url("https://i.ytimg.com/vi/WVkRC6iBWJ0/maxresdefault.jpg") center/cover no-repeat fixed;
color:#e5e7eb;
display:flex;
height:100vh
}

.sidebar{
width:250px;
padding:28px 16px;
background:#0b1220
}

.sidebar a{
display:block;
color:#cbd5f5;
text-decoration:none;
padding:16px 18px;
border-radius:8px;
font-size:16px;
margin-bottom:6px
}

.sidebar a:hover{background:#121a2b}
.sidebar .active{background:#121a2b;color:#7c8cff}

.main{
flex:1;
padding:36px 50px
}

.panel{
background:rgba(11,18,32,.85);
border:1px solid #1f2937;
border-radius:10px;
padding:28px;
backdrop-filter:blur(6px)
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px
}

h1{font-size:32px;font-weight:600}

.actions{display:flex;gap:14px}

.btn{
padding:12px 22px;
border-radius:8px;
font-size:15px;
cursor:pointer
}

.outline{
background:transparent;
border:1px solid #6366f1;
color:#a5b4fc
}

.primary{
background:#6366f1;
border:none;
color:#fff
}

.divider{
height:1px;
background:#1f2937;
margin:22px 0
}

.section{
font-size:18px;
margin-bottom:20px
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:24px 36px;
max-width:900px
}

.group{display:flex;flex-direction:column}

label{
font-size:13px;
color:#cbd5f5;
margin-bottom:6px
}

input,select{
background:#020617;
border:1px solid #2a3553;
color:#fff;
padding:12px 12px;
border-radius:6px;
font-size:14px
}

input:focus,select:focus{
outline:none;
border-color:#6366f1
}

.subdomain{display:flex}

.subdomain input{
border-top-right-radius:0;
border-bottom-right-radius:0;
border-right:none;
flex:1
}

.suffix{
background:#020617;
border:1px solid #2a3553;
border-left:none;
padding:12px 12px;
border-top-right-radius:6px;
border-bottom-right-radius:6px;
color:#94a3b8;
font-size:14px
}

.save{margin-top:24px}

@media(max-width:900px){
.grid{grid-template-columns:1fr}
.sidebar{display:none}
}
</style>
</head>
<body>

<div class="sidebar">
<a href="#">Dashboard</a>
<a href="#" class="active">World Settings</a>
<a href="#">Server Properties</a>
<a href="#">Player Settings</a>
<a href="#">World & Backups</a>
<a href="#">File Manager</a>
<a href="#">World Logs</a>
<a href="#">Additional Ports</a>
<a href="#">Access Management</a>
</div>

<div class="main">

<div class="panel">

<div class="top">
<h1>World Settings</h1>
<div class="actions">
<button class="btn outline">Back</button>
<button class="btn primary">Start World</button>
</div>
</div>

<div class="divider"></div>

<div class="section">World Details</div>

<div class="grid">

<div class="group">
<label>World Name</label>
<input value="Example">
</div>

<div class="group">
<label>Subdomain</label>
<div class="subdomain">
<input value="example">
<div class="suffix">.sdlf.fun</div>
</div>
</div>

<div class="group">
<label>Server Type</label>
<select>
<option>Paper</option>
<option>Spigot</option>
<option>Vanilla</option>
</select>
</div>

<div class="group">
<label>Server Version</label>
<select>
<option>Latest - keeps you up to date with the latest version</option>
<option>1.21</option>
<option>1.20.4</option>
<option>1.19.4</option>
</select>
</div>

<div class="group">
<label>Server Timezone</label>
<select>
<option>America/New_York</option>
<option>America/Chicago</option>
<option>America/Los_Angeles</option>
<option>UTC</option>
</select>
</div>

<div class="group">
<label>Java Version</label>
<select>
<option>Automatic - Chooses the correct version based on your...</option>
<option>Java 21</option>
<option>Java 17</option>
<option>Java 8</option>
</select>
</div>

</div>

<button class="btn primary save">Save Changes</button>

</div>

</div>

</body>
</html>
