<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seedloaf | Premium Support</title>
    <style>
        :root {
            --bg-color: #0f0f12;
            --card-bg: #18181b;
            --accent-purple: #9d56ff;
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
            --dev-box: #27272a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .chat-card {
            width: 400px;
            height: 550px;
            background: var(--card-bg);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            border: 1px solid #333;
            overflow: hidden;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
        }

        .header {
            padding: 20px;
            background: linear-gradient(135deg, #7c3aed, #9d56ff);
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 80%;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .user-msg {
            align-self: flex-end;
            background: var(--accent-purple);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .dev-msg {
            align-self: flex-start;
            background: var(--dev-box);
            border: 1px solid #444;
            border-bottom-left-radius: 2px;
        }

        .dev-tag {
            display: block;
            font-size: 0.7rem;
            color: var(--accent-purple);
            font-weight: bold;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .input-area {
            padding: 15px;
            background: #202023;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: #0f0f12;
            border: 1px solid #333;
            padding: 10px;
            border-radius: 8px;
            color: white;
            outline: none;
        }

        button {
            background: var(--accent-purple);
            border: none;
            color: white;
            padding: 0 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="chat-card">
    <div class="header">
        <span>Seedloaf Support</span>
        <small style="opacity: 0.8;">Premium Tier</small>
    </div>
    
    <div class="chat-box" id="chatBox">
        <div class="message dev-msg">
            <span class="dev-tag">System</span>
            Welcome to Premium Support. How can we help you today?
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const WEBHOOK_URL = 'https://discord.com/api/webhooks/1478137199676494008/uCwIDqV35QeFN5jjpwTB_nnxkc8AYNqNpB7QQJnE3mGAqjgQjDoRIR75TG74okaOoGdF';

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const chatBox = document.getElementById('chatBox');
        const msgText = input.value.trim();

        if (msgText === "") return;

        // 1. Add User Message to UI
        const userDiv = document.createElement('div');
        userDiv.className = 'message user-msg';
        userDiv.innerText = msgText;
        chatBox.appendChild(userDiv);
        
        input.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        // 2. Send to Discord Webhook
        try {
            await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: "Premium User",
                    content: `**New Ticket Message:** ${msgText}`
                })
            });
        } catch (error) {
            console.error('Error sending to Discord:', error);
        }

        // 3. Simulate "Dev Response"
        setTimeout(() => {
            const devDiv = document.createElement('div');
            devDiv.className = 'message dev-msg';
            devDiv.innerHTML = `<span class="dev-tag">Dev Response</span> We've received your request! A developer is looking into this now.`;
            chatBox.appendChild(devDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }, 1500);
    }

    // Allow pressing "Enter" to send
    document.getElementById('userInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
