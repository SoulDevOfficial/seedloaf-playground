<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seedloaf | Premium Support</title>
    <style>
        :root {
            --bg-color: #0f0f12;
            --card-bg: #18181b;
            --accent-purple: #9d56ff;
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
            --dev-box: #27272a;
            --input-bg: #09090b;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .chat-card {
            width: 420px;
            height: 650px;
            background: var(--card-bg);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            border: 1px solid #27272a;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .header {
            padding: 18px 20px;
            background: #1f1f23;
            border-bottom: 1px solid #27272a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title { font-weight: 700; font-size: 1.1rem; color: var(--accent-purple); }

        .dev-toggle-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            color: var(--text-dim);
            cursor: pointer;
        }

        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333; transition: .3s; border-radius: 20px;
        }
        .slider:before {
            position: absolute; content: ""; height: 12px; width: 12px;
            left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent-purple); }
        input:checked + .slider:before { transform: translateX(16px); }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-image: radial-gradient(#27272a 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 14px;
            max-width: 85%;
            font-size: 0.92rem;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .user-msg { align-self: flex-end; background: var(--accent-purple); border-bottom-right-radius: 2px; }
        .dev-msg { align-self: flex-start; background: var(--dev-box); border: 1px solid #3f3f46; border-bottom-left-radius: 2px; }
        .dev-tag { display: block; font-size: 0.65rem; color: var(--accent-purple); font-weight: 800; margin-bottom: 4px; text-transform: uppercase; }

        .controls-wrapper {
            background: #18181b;
            border-top: 1px solid #27272a;
            padding: 15px 20px;
        }

        .input-area { display: flex; gap: 12px; margin-bottom: 12px; }

        .webhook-area {
            border-top: 1px solid #27272a;
            padding-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .webhook-label {
            font-size: 0.65rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
        }

        input[type="text"] {
            background: var(--input-bg);
            border: 1px solid #27272a;
            padding: 10px;
            border-radius: 8px;
            color: white;
            outline: none;
            font-size: 0.85rem;
            transition: border 0.2s;
        }

        input[type="text"]:focus { border-color: var(--accent-purple); }

        button {
            background: var(--accent-purple);
            border: none;
            color: white;
            padding: 0 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="chat-card">
    <div class="header">
        <span class="header-title">Seedloaf Support</span>
        <label class="dev-toggle-container">
            Dev Mode
            <div class="switch">
                <input type="checkbox" id="devToggle">
                <span class="slider"></span>
            </div>
        </label>
    </div>
    
    <div class="chat-box" id="chatBox">
        <div class="message dev-msg">
            <span class="dev-tag">System</span>
            Welcome to the Premium Lounge. Please configure your Webhook below to begin.
        </div>
    </div>

    <div class="controls-wrapper">
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type a message..." style="flex: 1;">
            <button onclick="handleSend()">Send</button>
        </div>

        <div class="webhook-area">
            <span class="webhook-label">Dev Webhook URL (Required)</span>
            <input type="text" id="webhookInput" placeholder="https://discord.com/api/webhooks/...">
        </div>
    </div>
</div>

<script>
    async function handleSend() {
        const input = document.getElementById('userInput');
        const webhookInput = document.getElementById('webhookInput');
        const chatBox = document.getElementById('chatBox');
        const isDev = document.getElementById('devToggle').checked;
        const msgText = input.value.trim();
        const customWebhook = webhookInput.value.trim();

        if (msgText === "" || customWebhook === "") return;

        const msgDiv = document.createElement('div');
        if (isDev) {
            msgDiv.className = 'message dev-msg';
            msgDiv.innerHTML = `<span class="dev-tag">Dev Response</span> ${msgText}`;
        } else {
            msgDiv.className = 'message user-msg';
            msgDiv.innerText = msgText;
        }

        chatBox.appendChild(msgDiv);
        input.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            await fetch(customWebhook, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: isDev ? "Seedloaf Developer" : "Premium User",
                    content: msgText
                })
            });
        } catch (error) {
            console.error(error);
        }

        if (!isDev) {
            setTimeout(() => {
                const autoDiv = document.createElement('div');
                autoDiv.className = 'message dev-msg';
                autoDiv.innerHTML = `<span class="dev-tag">Dev Response</span> Request received. A developer will be with you shortly.`;
                chatBox.appendChild(autoDiv);
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 1000);
        }
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleSend();
    });
</script>

</body>
</html>
