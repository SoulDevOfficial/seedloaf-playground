<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>World List</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Segoe UI,sans-serif}
body{
background:url("https://cdn.discordapp.com/attachments/1256071149998047242/1479172648448688231/IiTmJ.png?ex=69abbb21&is=69aa69a1&hm=f9e2a2a70d3ec6af0123aa42977ba3ee312a91a7e02e98905c5c8c42cfc58ea5&") center/cover no-repeat fixed;
color:#e5e7eb;
display:flex;
height:100vh
}

.sidebar{width:290px;padding:22px 16px;background:#0b1220}
.logo{font-size:20px;font-weight:600;margin-bottom:28px}

.sidebar a{
display:block;
width:100%;
color:#cbd5f5;
text-decoration:none;
padding:16px 18px;
border-radius:7px;
font-size:16px;
margin-bottom:10px
}

.sidebar a:hover{background:#121a2b}
.sidebar a.active{background:#121a2b;color:#7c8cff}

.badge{
background:linear-gradient(90deg,#7c8cff,#ff4fd8);
padding:4px 8px;
border-radius:6px;
font-size:11px;
margin-left:8px;
color:#fff;
font-weight:700
}

.line{height:1px;background:#1f2937;margin:20px 0}

.main{flex:1;padding:26px 36px}

.topnav{display:flex;justify-content:flex-end;gap:22px;margin-bottom:20px;font-size:13px;color:#a5b4fc}

.panel{
background:rgba(11,18,32,.92);
border:1px solid #1f2937;
border-radius:10px;
padding:22px;
backdrop-filter:blur(6px);
max-width:900px
}

h1{font-size:26px;margin-bottom:14px}

.divider{height:1px;background:#1f2937;margin:14px 0}

.world-card{
background:#0b1220;
border:1px solid #1f2937;
border-radius:9px;
padding:18px
}

.world-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}

.world-name{color:#7c8cff;font-size:16px;font-weight:600}

.connection{font-size:13px;color:#cbd5f5}

.buttons{display:flex;gap:10px}

.btn{padding:10px 18px;border-radius:7px;font-size:13px;cursor:pointer}

.outline{background:transparent;border:1px solid #6366f1;color:#a5b4fc}
.primary{background:#6366f1;border:none;color:#fff}

.status-row{display:flex;justify-content:space-between;align-items:center;margin-top:10px}

.offline{color:#ff5c5c;font-size:13px}
.ram{color:#facc15;font-size:13px}

.create{margin-top:18px}

.create button{
background:#374151;
border:none;
color:#9ca3af;
padding:10px 16px;
border-radius:7px;
font-size:13px
}
</style>
</head>
<body>

<div class="sidebar">
<div class="logo">Seedloaf</div>

<a href="#" class="active">World List</a>
<a href="#">Upgrade your Plan <span class="badge">PREMIUM</span></a>

<div class="line"></div>
</div>

<div class="main">

<div class="topnav">
<div>Status</div>
<div>Documentation</div>
<div>Discord</div>
</div>

<div class="panel">

<h1>World List</h1>

<div class="divider"></div>

<div class="world-card">

<div class="world-top">
<div>
<div class="world-name">Example</div>
<div class="connection">Connection URL: example.sdlf.fun</div>
</div>

<div class="buttons">
<button class="btn outline">Manage World</button>
<button class="btn primary">Start World</button>
</div>
</div>

<div class="divider"></div>

<div class="status-row">
<div class="offline">Offline</div>
<div class="ram">Additional RAM</div>
</div>

</div>

<div class="create">
<button>Create another world</button>
</div>

</div>

</div>

</body>
</html>
