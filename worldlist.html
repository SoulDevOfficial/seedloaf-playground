<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>World List</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body{
background:url("assets/background-main.png") center/cover no-repeat fixed;
color:#e5e7eb;
display:flex;
height:100vh
}

.pixel-font {
  font-family: 'Press Start 2P', cursive;
  image-rendering: pixelated;
}

@keyframes glimmer {
  0% { transform: translateX(-100%) skewX(-15deg); }
  100% { transform: translateX(200%) skewX(-15deg); }
}

.glimmer-btn {
  position: relative;
  overflow: hidden;
}

.glimmer-btn::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(
    90deg,
    rgba(255, 255, 255, 0) 0%,
    rgba(255, 255, 255, 0.4) 50%,
    rgba(255, 255, 255, 0) 100%
  );
  transform: translateX(-100%) skewX(-15deg);
}

.glimmer-btn:hover::after {
  animation: glimmer 1.2s ease-in-out;
}

.glimmer-btn:active::after {
  background: linear-gradient(
    90deg,
    rgba(255, 255, 255, 0) 0%,
    rgba(255, 255, 255, 0.6) 50%,
    rgba(255, 255, 255, 0) 100%
  );
  animation: glimmer 0.5s ease-in-out; 
}
</style>

</head>
<body class="text-[#e5e7eb] flex h-screen">

<div class="w-[290px] p-[22px] px-[16px] bg-[#0b1220] flex-shrink-0">

<a href="#" class="flex items-center gap-3 mb-[28px] cursor-pointer">
  <img src="assets/site-logo.png" 
       alt="Seedloaf Icon" 
       class="w-[48px] h-[48px] block" 
       style="image-rendering: pixelated;"/>
  <span class="pixel-font text-[18px] leading-none text-white">Seedloaf</span>
</a>

<a class="block w-full text-[#7c8cff] bg-[#121a2b] py-[16px] px-[18px] rounded-[7px] text-[16px] mb-[10px] cursor-pointer">
World List
</a>

<a class="glimmer-btn block w-full text-white py-[10px] px-[18px] rounded-[7px] text-[16px] mb-[10px] font-medium cursor-pointer"
style="background:linear-gradient(90deg,#7c8cff,#ff4fd8)">
Upgrade your Plan
</a>

<div class="h-[1px] bg-[#1f2937] my-[20px]"></div>

</div>

<div class="flex-1 px-[36px] py-[26px] overflow-y-auto">

<div class="flex justify-end gap-[12px] mb-[20px]">
<button class="bg-[#0b1220] border border-[#1f2937] text-[#a5b4fc] text-[13px] px-[14px] py-[8px] rounded-[7px] hover:bg-[#121a2b]">Status</button>
<button class="bg-[#0b1220] border border-[#1f2937] text-[#a5b4fc] text-[13px] px-[14px] py-[8px] rounded-[7px] hover:bg-[#121a2b]">Documentation</button>
<button class="bg-[#0b1220] border border-[#1f2937] text-[#a5b4fc] text-[13px] px-[14px] py-[8px] rounded-[7px] hover:bg-[#121a2b]">Discord</button>
</div>

<div class="bg-[rgba(11,18,32,.92)] border border-[#1f2937] rounded-[10px] p-[22px] backdrop-blur max-w-[900px]">

<h1 class="text-[26px] mb-[14px]">World List</h1>

<div class="h-[1px] bg-[#1f2937] my-[14px]"></div>

<div class="bg-[#0b1220] border border-[#1f2937] rounded-[9px] p-[18px]">
<div class="flex justify-between items-center mb-[8px]">
<div>
<div class="text-[#7c8cff] text-[16px] font-semibold">Example</div>
<div class="text-[13px] text-[#cbd5f5]">Connection URL: example.sdlf.fun</div>
</div>

<div class="flex gap-[10px]">
<button class="bg-transparent border border-[#6366f1] text-[#a5b4fc] text-[13px] px-[18px] py-[10px] rounded-[7px]">Manage World</button>
<button class="bg-[#6366f1] text-white text-[13px] px-[18px] py-[10px] rounded-[7px]">Start World</button>
</div>
</div>

<div class="h-[1px] bg-[#1f2937] my-[14px]"></div>

<div class="flex justify-between items-center mt-[10px]">
<div class="text-[#ff5c5c] text-[13px]">Offline</div>
<div class="text-[#facc15] text-[13px]">Additional RAM</div>
</div>
</div>

<div class="mt-[18px]">
<button class="bg-[#374151] text-[#9ca3af] text-[13px] px-[16px] py-[10px] rounded-[7px]">
Create another world
</button>
</div>

</div>

</div>

</body>
</html>
