<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>World List</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet"/>

<style>
body{
background:url("https://cdn.discordapp.com/attachments/1256071149998047242/1479172648448688231/IiTmJ.png?ex=69ab1261&is=69a9c0e1&hm=f43ebc8e7afa3c4ca66d1523956d8c5cb87b17cb1920b7ae50a9ed34f03249bb&") center/cover no-repeat fixed;
}

<body class="flex min-h-screen text-white">

<!-- SIDEBAR -->
<div class="w-72 bg-base-200 p-6">

<div class="text-xl font-semibold mb-6">Seedloaf</div>

<ul class="menu text-base">

<li>
<a class="active text-white">World List</a>
</li>

<li>
<a class="text-white">
Upgrade your Plan
<span class="badge badge-secondary font-bold text-white ml-2">PREMIUM</span>
</a>
</li>

</ul>

<div class="divider"></div>

</div>


<!-- MAIN -->
<div class="flex-1 p-8">

<div class="flex justify-end gap-6 text-sm text-white mb-6">
<a href="#">Status</a>

<div class="card bg-base-200/90 backdrop-blur border border-base-300 max-w-3xl shadow-md">

<h1 class="text-xl font-semibold">World List</h1>

<div class="divider my-2"></div>

<div class="card bg-base-100 border border-base-300">

</div>

</button>

</div>

</div>
